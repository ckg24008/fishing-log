<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規投稿</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header>
        <div style="display: flex; align-items: center;">
            <a href="/" style="margin-right: 15px; font-size: 1.2rem;">✕</a>
            <h1>新規投稿</h1>
        </div>
    </header>

    <div class="container" style="margin-top: 20px;">
        <form action="/post/new" method="post" enctype="multipart/form-data">
            
            <div class="form-group" style="background: #e3f2fd; padding: 15px; border-radius: 8px; border: 1px solid #bbdefb;">
                <label style="display: flex; align-items: center; cursor: pointer; margin: 0; color: #0d47a1;">
                    <input type="checkbox" name="is_public" value="true" style="width: auto; margin-right: 10px; transform: scale(1.2);">
                    <b>みんなの掲示板に公開する</b>
                </label>
                <p style="margin: 5px 0 0 25px; font-size: 0.8rem; color: #555;">
                    ※チェックを入れると他のユーザーにも表示されます。<br>
                    以下の項目ごとに公開/非公開を選べます。
                </p>
            </div>

            <div class="form-group">
                <label>釣果写真</label>
                <input type="file" name="file" accept="image/*" required style="padding: 10px; background: white;">
            </div>

            <div class="form-group">
                <label>釣行日時</label>
                <input type="datetime-local" name="caught_at" required>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 2;">
                    <label>魚種</label>
                    <input type="text" name="fish_name" placeholder="例: アジ" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>数</label>
                    <input type="number" name="quantity" value="1" required>
                </div>
            </div>

            <div class="form-group">
                <label>サイズ (cm)</label>
                <input type="number" name="size_cm" step="0.1" placeholder="0.0" required>
            </div>

            <div class="form-group" style="background: white; padding: 10px; border-radius: 8px; border: 1px solid #eee;">
                <label>場所</label>
                <input type="text" name="place" placeholder="釣り場名" required>
                
                <label style="display: flex; align-items: center; cursor: pointer; margin-top: 10px; font-size: 0.9rem; color: #666;">
                    <input type="checkbox" name="is_place_public" value="true" checked style="width: auto; margin-right: 8px;">
                    この場所名を公開する
                </label>
            </div>

            <div class="form-group">
                <label>天気</label>
                <select name="weather">
                    <option value="晴れ">☀️ 晴れ</option>
                    <option value="曇り">☁️ 曇り</option>
                    <option value="雨">☔️ 雨</option>
                </select>
            </div>

            <div class="form-group" style="background: white; padding: 10px; border-radius: 8px; border: 1px solid #eee;">
                <label>タックル・メモ</label>
                
                {% if user and (user.tackle_1 or user.tackle_2 or user.tackle_3) %}
                    <div style="margin-bottom: 8px; display: flex; gap: 5px; flex-wrap: wrap; align-items: center;">
                        <span style="font-size: 0.8rem; color: #666;">呼出:</span>
                        
                        {% if user.tackle_1 %}
                            <textarea id="tackle-1-val" style="display:none;">{{ user.tackle_1 }}</textarea>
                            <button type="button" onclick="loadTackle('tackle-1-val')" class="btn-mini" style="padding: 2px 8px; font-size: 0.8rem;">セットA</button>
                        {% endif %}

                        {% if user.tackle_2 %}
                            <textarea id="tackle-2-val" style="display:none;">{{ user.tackle_2 }}</textarea>
                            <button type="button" onclick="loadTackle('tackle-2-val')" class="btn-mini" style="padding: 2px 8px; font-size: 0.8rem;">セットB</button>
                        {% endif %}

                        {% if user.tackle_3 %}
                            <textarea id="tackle-3-val" style="display:none;">{{ user.tackle_3 }}</textarea>
                            <button type="button" onclick="loadTackle('tackle-3-val')" class="btn-mini" style="padding: 2px 8px; font-size: 0.8rem;">セットC</button>
                        {% endif %}
                    </div>
                {% endif %}

                <textarea name="memo" id="memo-area" rows="4" placeholder="ロッド、リール、仕掛け、感想など..."></textarea>
                
                <label style="display: flex; align-items: center; cursor: pointer; margin-top: 10px; font-size: 0.9rem; color: #666;">
                    <input type="checkbox" name="is_tackle_public" value="true" checked style="width: auto; margin-right: 8px;">
                    このメモを公開する
                </label>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 20px; margin-bottom: 50px;">
                保存する
            </button>
        </form>
    </div>

    <script>
        window.onload = function() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementsByName('caught_at')[0].value = now.toISOString().slice(0, 16);
        };

        // 日時の初期値設定（既存）
        window.onload = function() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementsByName('caught_at')[0].value = now.toISOString().slice(0, 16);
        };

        // ★追加: タックル呼び出し機能
        function loadTackle(elementId) {
            const text = document.getElementById(elementId).value;
            const textArea = document.getElementById('memo-area');
            
            if (text) {
                if (textArea.value.trim() !== "") {
                    if (confirm("現在入力されているメモに追記しますか？\n（キャンセルを押すと上書きします）")) {
                        textArea.value += "\n" + text;
                    } else {
                        textArea.value = text;
                    }
                } else {
                    textArea.value = text;
                }
            }
        }
    </script>
</body>
</html>
