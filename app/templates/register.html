<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録 - Fishing Log</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 60px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }
        .logo-emoji { font-size: 3rem; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Fishing Log 🎣</h1>
            <a href="/" style="font-size: 0.9rem;">HOME</a>
        </div>
    </header>

    <div class="auth-container">
        <span class="logo-emoji">🎣</span>
        <h2 style="color: var(--primary-color);">新規会員登録</h2>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">
            あなただけの釣り記録をはじめましょう。
        </p>

        {% if error %}
            <div style="background:#ffebee; color:#c62828; padding:10px; border-radius:5px; margin-bottom:15px; font-size:0.9rem;">
                {{ error }}
            </div>
        {% endif %}

        <form action="/register" method="post">
            <div class="form-group">
                <input type="email" name="email" placeholder="メールアドレス" required>
            </div>
            <div class="form-group">
                <input type="text" name="nickname" placeholder="ニックネーム (表示名)" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="パスワード" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="background-color: var(--accent-color); margin-top: 10px;">
                登録してはじめる
            </button>
        </form>

        <div style="margin-top: 20px; font-size: 0.9rem;">
            すでにアカウントをお持ちですか？<br>
            <a href="/login" style="color: var(--primary-color); font-weight: bold;">ログインはこちら</a>
        </div>
    </div>

</body>
</html>
